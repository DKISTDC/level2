services:


  # -- workers ---------------------------------------------------
  frame-cataloger: 
    image: frame-cataloger
    depends_on:
      interservice-bus:
        condition: service_healthy
    build:
      context: "${FRAME_CATALOGER_LOCAL:-../frame-cataloger}"

    # handles messages, saves a nearly-empty frame to metadata-store-api
    command: ["python", "dev/save.py"]

    environment:
      LOGURU_LEVEL: "INFO"
      GQL_AUTH_TOKEN: "dev"
      MESH_CONFIG: '{
          "interservice-bus": { "mesh_address": "interservice-bus","mesh_port": 5672},
          "internal-api-gateway": {"mesh_address": "metadata-store-api","mesh_port": 8080}
        }'

  object-cataloger: 
    image: object-cataloger
    depends_on:
      interservice-bus:
        condition: service_healthy
    build:
      context: "${OBJECT_CATALOGER_LOCAL:-../object-cataloger}"
      dockerfile: Dockerfile
      pull: false

    # handles messages, saves a nearly-empty frame to metadata-store-api
    command: ["python", "dev/save.py"]

    environment:
      LOGURU_LEVEL: "INFO"
      GQL_AUTH_TOKEN: "dev"
      MESH_CONFIG: '{
          "interservice-bus": { "mesh_address": "interservice-bus","mesh_port": 5672},
          "internal-api-gateway": {"mesh_address": "metadata-store-api","mesh_port": 8080}
        }'



  # -- metadata-store-api ----------------------------------------

  metadata-postgres:
    image: metadata-postgres
    build:
      context: "${METADATA_STORE_API_LOCAL:-../metadata-store-api}"
      dockerfile: postgres.Dockerfile
    ports:
      - "54320:5432"

  metadata-mongodb:
    image: metadata-mongodb
    build:
      context: "${METADATA_STORE_API_LOCAL:-../metadata-store-api}"
      dockerfile: mongodb.Dockerfile
    ports:
      - "27017:27017"

  metadata-store-api:
    image: metadata-store-api
    depends_on:
      - metadata-mongodb
      - metadata-postgres
    build:
      context: "${METADATA_STORE_API_LOCAL:-../metadata-store-api}"
      dockerfile: Dockerfile
      pull: false

    # manually run the service, instead of using gunicorn
    command: ["python", "."]

    environment:
      MESH_CONFIG: '{
          "metadata-store-operations-support": { "mesh_address": "metadata-postgres","mesh_port": 5432},
          "metadata-store-processing-support": {"mesh_address": "metadata-postgres","mesh_port": 5432},
          "metadata-store-quality-report": {"mesh_address": "metadata-postgres","mesh_port": 5432},
          "metadata-store-search-support": {"mesh_address": "metadata-postgres","mesh_port": 5432},
          "metadata-store-object-inventory": {"mesh_address": "metadata-mongodb","mesh_port": 27017}
        }'

    ports:
      - "8080:8080"

  # -- interservice-bus ----------------------------------------
 
  interservice-bus:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"    # AMQP protocol
      - "15672:15672"  # RabbitMQ management UI
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 7s
      timeout: 5s
      retries: 5

  # level2 -----------------------------------------------

  postgres:
    image: postgres:16.4
    # this makes it try to always be on, even if the container isn't running
    # restart: always
    environment:
      POSTGRES_DB: level2
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
    volumes:
      - pgdata:/var/lib/pgsql/data
    ports:
      - "5432:5432"

  nginx:
    image: nginx:1.28.0-alpine
    volumes:
      # - ./deps/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./deps/nginx.conf:/etc/nginx/conf.d/default.conf
      - ~/certs:/etc/nginx/certs:ro
    ports:
      - "443:443"
    attach: false

  level2:
    profiles: ["app"]
    image: level2
    cpus: 4.0
    build:
      context: .
    depends_on:
      postgres:
        condition: service_started
      interservice-bus:
        condition: service_healthy
      metadata-store-api:
        condition: service_started
    ports:
      - "3033:3033"
    environment:
      # APP
      APP_DOMAIN: "localhost"
      APP_PORT: 3033
      CPU_WORKERS: 4

      # LOCAL SERVICES
      DATABASE_URL: postgres://dev:dev@postgres:5432/level2

      # TMP
      SCRATCH_DIR: ${SCRATCH_DIR:-/tmp/level2}

      # GLOBUS
      GLOBUS_CLIENT_ID: ${GLOBUS_CLIENT_ID}
      GLOBUS_CLIENT_SECRET: ${GLOBUS_CLIENT_SECRET}
      GLOBUS_SCRATCH: ${GLOBUS_SCRATCH:-globus://03232d38-5e57-11ef-b967-17fffa478f3e/Data/level2}   # TARDIGRADE}
      GLOBUS_LEVEL1: ${GLOBUS_LEVEL1:-globus://d26bd00b-62dc-40d2-9179-7aece2b8c437/}
      GLOBUS_PUBLISH: ${GLOBUS_PUBLISH:-globus://03232d38-5e57-11ef-b967-17fffa478f3e/Data/level2}


      # DKIST
      ISB_USERNAME: guest
      ISB_PASSWORD: guest
      ISB_EXCHANGE: master.direct.x

      GQL_AUTH_TOKEN: dev

      MESH_CONFIG: '{
          "interservice-bus": {"mesh_address": "interservice-bus", "mesh_port": 5672}, 
          "internal-api-gateway": {"mesh_address": "internal-api-gateway.service.prod.consul", "mesh_port": 80}
        }'



networks:
  default:
    name: level2

volumes:
  pgdata:
